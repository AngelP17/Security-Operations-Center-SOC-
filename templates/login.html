<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            black: '#0a0a0b',
                            dark: '#111827',
                            green: '#10b981',
                            red: '#ef4444',
                            border: '#1f2937'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(17, 24, 39, 1) 0%, rgba(5, 5, 5, 1) 100%);
        }

        .grid-bg {
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: -10%;
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            95% {
                opacity: 1;
            }

            100% {
                top: 110%;
                opacity: 0;
            }
        }
    </style>
</head>

<body class="grid-bg min-h-screen flex items-center justify-center p-4 text-zinc-200 overflow-hidden relative">

    <!-- Background Decor -->
    <div class="scan-line"></div>
    <div class="absolute top-10 left-10 opacity-20 text-emerald-900 font-mono text-xs">
        System.Status: ONLINE<br>
        Port.Scan: ACTIVE<br>
        Threat.Level: LOW
    </div>
    <div class="absolute bottom-10 right-10 opacity-20 text-emerald-900 font-mono text-xs text-right">
        SOC.Version: 2.0.4<br>
        Encryption: AES-256<br>
        Auth.Protocol: OAUTH2
    </div>

    <!-- Login Card -->
    <div
        class="w-full max-w-md bg-zinc-900/80 backdrop-blur-md border border-zinc-800 rounded-xl shadow-2xl overflow-hidden relative z-10">
        <!-- Header -->
        <div class="border-b border-zinc-800 p-8 text-center bg-zinc-900/50 relative">
            <div class="absolute inset-0 bg-emerald-500/5"></div>
            <div
                class="w-16 h-16 bg-zinc-800 rounded-xl border border-zinc-700 mx-auto flex items-center justify-center mb-4 shadow-lg shadow-emerald-900/20 group hover:border-emerald-500/50 transition-colors">
                <i
                    class="fas fa-shield-halved text-3xl text-emerald-500 group-hover:scale-110 transition-transform"></i>
            </div>
            <h1 class="text-2xl font-bold font-sans tracking-tight text-white mb-1">SOC Access</h1>
            <p class="text-xs font-mono text-emerald-500/80 uppercase tracking-widest">Security Operations Center</p>
        </div>

        <!-- Form -->
        <div class="p-8 space-y-6">
            <form id="loginForm" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-xs font-mono font-bold text-zinc-500 uppercase ml-1">Identity</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i
                                class="fas fa-user-astronaut text-zinc-500 group-focus-within:text-emerald-500 transition-colors"></i>
                        </div>
                        <input type="text" id="username"
                            class="block w-full pl-10 pr-3 py-2.5 bg-black border border-zinc-700 rounded-lg text-sm placeholder-zinc-600 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 font-mono transition-all"
                            placeholder="admin">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-mono font-bold text-zinc-500 uppercase ml-1">Credentials</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i
                                class="fas fa-key text-zinc-500 group-focus-within:text-emerald-500 transition-colors"></i>
                        </div>
                        <input type="password" id="password"
                            class="block w-full pl-10 pr-3 py-2.5 bg-black border border-zinc-700 rounded-lg text-sm placeholder-zinc-600 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 font-mono transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 border border-emerald-600 rounded-lg text-sm font-semibold text-white bg-emerald-600 hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 focus:ring-offset-zinc-900 transition-all shadow-lg shadow-emerald-900/30 font-sans hover:shadow-emerald-500/20">
                    <i class="fas fa-fingerprint mr-2 mt-0.5"></i> Authenticate
                </button>
            </form>

            <div id="errorMsg"
                class="hidden p-3 rounded-lg bg-red-900/20 border border-red-900/50 text-red-200 text-xs font-mono flex items-center">
                <i class="fas fa-triangle-exclamation mr-2 text-red-500"></i>
                <span>Authentication Failed: Invalid Credentials</span>
            </div>
        </div>

        <!-- Footer check -->
        <div
            class="bg-black border-t border-zinc-800 p-4 flex items-center justify-between text-[10px] font-mono text-zinc-600">
            <div class="flex items-center">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-2 animate-pulse"></span>
                SECURE CONNECTION
            </div>
            <span>ID: <span class="text-zinc-500">SOC-8821</span></span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Verifying...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    btn.innerHTML = '<i class="fas fa-check mr-2"></i> Access Granted';
                    btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
                    btn.classList.add('bg-emerald-500');
                    setTimeout(() => window.location.href = '/security', 500);
                } else {
                    throw new Error('Invalid credentials');
                }
            } catch (err) {
                document.getElementById('errorMsg').classList.remove('hidden');
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                // Shake animation
                const card = document.querySelector('.max-w-md');
                card.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => card.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
            }
        });
    </script>
</body>

</html>
