name: GPT-Taste QA Hard Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'styles/**'
      - '**/*.css'
      - '**/*.tsx'
      - '**/*.ts'
  workflow_dispatch:

jobs:
  gpt-taste-review:
    name: GPT-Taste Design QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate review script
        run: |
          if [ ! -f "scripts/gpt-taste-api-review.js" ]; then
            echo "::error::Review script not found at scripts/gpt-taste-api-review.js"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Get changed files
        id: changed-files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FILES=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep -E '\.(ts|tsx|css)$' | tr '\n' ' ' || true)
          COUNT=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep -c -E '\.(ts|tsx|css)$' || echo 0)
          echo "CHANGED_FILES=$FILES" >> $GITHUB_ENV
          echo "changed_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Files to review: $COUNT"
          echo "$FILES"

      - name: Run GPT-Taste QA Review
        if: steps.changed-files.outputs.changed_count > 0
        id: gpt-taste
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ env.CHANGED_FILES }}
          REVIEW_OUTPUT: ${{ github.workspace }}/gpt-taste-review.json
        run: |
          node scripts/gpt-taste-api-review.js

      - name: Upload review artifact
        if: steps.changed-files.outputs.changed_count > 0 && steps.gpt-taste.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gpt-taste-review-${{ github.run_id }}
          path: ${{ github.workspace }}/gpt-taste-review.json
          retention-days: 7

      - name: Post PR comment
        if: steps.changed-files.outputs.changed_count > 0 && steps.gpt-taste.outcome == 'success'
        uses: actions/github-script@v7
        env:
          REVIEW_OUTPUT: ${{ github.workspace }}/gpt-taste-review.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewPath = process.env.REVIEW_OUTPUT;
            
            if (!fs.existsSync(reviewPath)) {
              console.log('No review output found');
              return;
            }
            
            let review;
            try {
              review = JSON.parse(fs.readFileSync(reviewPath, 'utf8'));
            } catch (e) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## GPT-Taste Design QA Review\n\n**Error:** Failed to parse review output. See workflow logs for details.`
              });
              throw new Error(`Failed to parse review output: ${e.message}`);
            }
            
            const config = JSON.parse(fs.readFileSync('.claude/gpt-taste-config.json', 'utf8'));
            const status = review.pass ? 'PASSED' : 'FAILED';
            
            let body = `## GPT-Taste Design QA Review\n\n`;
            body += `**Status:** ${status}  \n`;
            body += `**Overall Score:** ${review.overall_score}/100  \n`;
            body += `**Mode:** ${config.enforcement_mode.toUpperCase()}  \n\n`;
            
            if (!review.findings || review.findings.length === 0) {
              body += `No issues detected in changed files.\n\n`;
            } else {
              const failures = review.findings.filter(f => f.status === 'fail');
              const warnings = review.findings.filter(f => f.status === 'warn');
              const passes = review.findings.filter(f => f.status === 'pass');
              
              if (failures.length > 0) {
                body += `### Issues Found (${failures.length})\n\n`;
                failures.forEach(f => {
                  const escapedMsg = f.message.replace(/`/g, '\\`').replace(/\*/g, '\\*');
                  body += `- **${f.rule}** in \`${f.file}\`${f.line ? ` (line ${f.line})` : ''}\n`;
                  body += `  - ${escapedMsg}\n\n`;
                });
              }
              
              if (warnings.length > 0) {
                body += `### Warnings (${warnings.length})\n\n`;
                warnings.forEach(f => {
                  const escapedMsg = f.message.replace(/`/g, '\\`').replace(/\*/g, '\\*');
                  body += `- **${f.rule}** in \`${f.file}\`\n`;
                  body += `  - ${escapedMsg}\n\n`;
                });
              }
              
              if (passes.length > 0) {
                body += `<details>\n<summary>Passed Rules (${passes.length})</summary>\n\n`;
                passes.forEach(f => {
                  body += `- ${f.rule} in \`${f.file}\`\n`;
                });
                body += `</details>\n\n`;
              }
            }
            
            body += `---\n*Reviewed with GPT-Taste v1.0* | [Configuration](.claude/gpt-taste-config.json)`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on hard mode
        if: steps.changed-files.outputs.changed_count > 0 && steps.gpt-taste.outcome == 'success'
        env:
          REVIEW_OUTPUT: ${{ github.workspace }}/gpt-taste-review.json
        run: |
          const fs = require('fs');
          const reviewPath = process.env.REVIEW_OUTPUT;
          
          if (!fs.existsSync(reviewPath)) {
            console.error('Review output not found');
            process.exit(1);
          }
          
          const review = JSON.parse(fs.readFileSync(reviewPath, 'utf8'));
          const config = JSON.parse(fs.readFileSync('.claude/gpt-taste-config.json', 'utf8'));
          
          if (config.enforcement_mode === 'hard' && !review.pass) {
            console.error('GPT-Taste QA failed in hard mode');
            process.exit(1);
          }
        shell: node
